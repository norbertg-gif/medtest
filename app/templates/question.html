<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #4f73ff, #6c5ce7);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .sidebar {
            width: 220px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        h3 {
            margin-top: 0;
        }

        .progress-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-fill {
            height: 100%;
            background: #4f73ff;
        }

        .answer {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .answer:hover {
            background: #f3f6ff;
        }

        .error {
            color: red;
            font-weight: bold;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .next-btn {
            background: #4f73ff;
            color: white;
        }

        .next-btn:hover {
            background: #3d5fe0;
        }

        .skip-btn {
            background: #ddd;
        }

        .skip-btn:hover {
            background: #ccc;
        }

        .skipped-number {
            background: #ffeaa7;
            padding: 5px 8px;
            border-radius: 6px;
            display: inline-block;
            margin: 3px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="progress-text">
            {{ current_number }}/{{ total_questions }}
        </div>

        <div class="progress-bar">
            <div class="progress-fill"
                 style="width: {{ (current_number / total_questions) * 100 }}%;">
            </div>
        </div>

        <h3>{{ question.text }}</h3>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="/answer">

            {% for answer in answers %}
                <div class="answer">
                    {% if question.multiple_allowed %}
                        <input type="checkbox" name="answer_ids" value="{{ answer.id }}">
                    {% else %}
                        <input type="radio" name="answer_ids" value="{{ answer.id }}">
                    {% endif %}
                    {{ answer.text }}
                </div>
            {% endfor %}

            <br>

            <button type="submit" name="action" value="next" class="next-btn">
                Ďalej
            </button>

            <button type="submit" name="action" value="skip" class="skip-btn">
                Preskočiť
            </button>

        </form>
    </div>

    <div class="sidebar">
        <strong>Preskočené:</strong><br><br>

        {% for s in skipped %}
            <div class="skipped-number">
                {{ s }}
            </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
