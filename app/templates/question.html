<!DOCTYPE html>
<html>
<head>
    <title>Otázka</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; padding:40px; display:flex; }
        .card { background:white; padding:25px; border-radius:8px; width:600px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
        .sidebar { margin-left:30px; background:white; padding:20px; border-radius:8px; width:150px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
        button { margin-top:15px; padding:8px 15px; margin-right:10px;}
        .skip { background:#ddd; }
        .error { color:red; margin-bottom:15px; }
    </style>
</head>
<body>

<div class="card">
    <h3>{{ question.text }}</h3>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="post" action="/answer">

        {% for answer in answers %}
            <div>
                {% if question.multiple_allowed %}
                    <input type="checkbox" name="answer_ids" value="{{ answer.id }}">
                {% else %}
                    <input type="radio" name="answer_ids" value="{{ answer.id }}">
                {% endif %}
                {{ answer.text }}
            </div>
        {% endfor %}

        <button type="submit" name="action" value="next">Ďalej</button>
        <button type="submit" name="action" value="skip" class="skip">Preskočiť</button>
    </form>
</div>

<div class="sidebar">
    <strong>Preskočené:</strong>
    <ul>
        {% for s in skipped %}
            <li>{{ s }}</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
