<!DOCTYPE html>
<html data-theme="light">
<head>
    <title>Admin panel</title>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f6f8ff, #eef1ff);
            --card-bg: white;
            --text: #222;
            --muted: #777;
            --border: #f0f0f0;
            --primary: #4f73ff;
            --primary-hover: #3d5fe0;
            --danger: #ff6b6b;
            --danger-hover: #e85b5b;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1f2235, #2b2f4a);
            --card-bg: #2f3354;
            --text: #f0f0f0;
            --muted: #bbb;
            --border: #3c4060;
            --primary: #6c8cff;
            --primary-hover: #5676ff;
            --danger: #ff7b7b;
            --danger-hover: #ff5c5c;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: var(--bg-gradient);
            color: var(--text);
            transition: 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 500;
        }

        .theme-toggle:hover {
            background: var(--primary-hover);
        }

        .section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            text-align: left;
            font-size: 13px;
            color: var(--muted);
            padding-bottom: 10px;
        }

        td {
            padding: 10px 6px;
            border-top: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(0,0,0,0.03);
        }

        input, select {
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
        }

        button {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            background: var(--primary);
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .danger {
            background: var(--danger);
        }

        .danger:hover {
            background: var(--danger-hover);
        }

        .status-finished {
            color: #2ecc71;
            font-weight: bold;
        }

        .status-active {
            color: #f39c12;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2>Admin panel</h2>
        Prihlásený: <strong>{{ admin.username }}</strong>
        |
        <a href="/logout">Odhlásiť</a>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">
        🌙 Dark mode
    </button>
</div>

<!-- obsah necháš rovnaký ako máš teraz -->

<script>
    const html = document.documentElement;

    function toggleTheme() {
        const current = html.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        localStorage.setItem("adminTheme", next);
    }

    // načítanie uloženého módu
    const savedTheme = localStorage.getItem("adminTheme");
    if (savedTheme) {
        html.setAttribute("data-theme", savedTheme);
    }
</script>

</body>
</html>
